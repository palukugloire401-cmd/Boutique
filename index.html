<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #070a13;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: #111827;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }
        
        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
        }
        
        .logo i {
            color: #00e676;
            margin-right: 8px;
        }
        
        button {
            background: #00e676;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            background: #00ff84;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        p {
            color: #9ca3af;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-box {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #1f2937;
        }
        
        .modal-box h2 {
            margin-bottom: 20px;
            color: white;
        }
        
        .modal-box input,
        .modal-box textarea,
        .modal-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #070a13;
            border: 1px solid #1f2937;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .modal-box textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .upload-area {
            border: 2px dashed #1f2937;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            background: #070a13;
        }
        
        .upload-area:hover {
            border-color: #00e676;
        }
        
        .upload-area i {
            font-size: 30px;
            color: #00e676;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn-cancel {
            background: transparent;
            border: 1px solid #1f2937;
            color: #9ca3af;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
        }
        
        .btn-cancel:hover {
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #111827;
            border-left: 3px solid #00e676;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 9999;
            animation: slide 0.3s ease;
        }
        
        @keyframes slide {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <a href="/" class="logo">
            <i class="fab fa-android"></i> OpenStore
        </a>
        <button onclick="ouvrirModal()">
            <i class="fas fa-plus"></i> Publier un APK
        </button>
    </div>

    <!-- CONTENU -->
    <div class="container">
        <h1>📱 Publiez & Téléchargez des Apps Android</h1>
        <p>Plateforme communautaire de partage d'applications Android.</p>
        <button onclick="ouvrirModal()" style="margin-right:10px;">
            <i class="fas fa-rocket"></i> Publier mon application
        </button>
        <button onclick="document.getElementById('catalogue').scrollIntoView({behavior:'smooth'})" 
                style="background:transparent; border:2px solid #00e676; color:#00e676;">
            <i class="fas fa-compass"></i> Explorer le catalogue
        </button>
    </div>

    <!-- MODAL -->
    <div class="modal" id="maModal">
        <div class="modal-box">
            <h2>📤 Publier une application</h2>
            
            <input type="text" id="appName" placeholder="Nom de l'application">
            <input type="text" id="developer" placeholder="Développeur">
            <input type="text" id="version" placeholder="Version (ex: 1.0.0)">
            
            <select id="category">
                <option value="outils">🛠️ Outils</option>
                <option value="jeux">🎮 Jeux</option>
                <option value="social">💬 Social</option>
                <option value="autre">📦 Autre</option>
            </select>
            
            <textarea id="description" placeholder="Description de l'application..."></textarea>
            
            <div class="upload-area" onclick="document.getElementById('apkFile').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Cliquez pour sélectionner un APK</p>
                <input type="file" id="apkFile" accept=".apk" style="display:none;" onchange="fichierSelectionne()">
            </div>
            
            <div id="fileInfo" style="display:none; color:#00e676; margin-bottom:10px;"></div>
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
                <button onclick="publier()">Publier</button>
            </div>
        </div>
    </div>

    <!-- CATALOGUE -->
    <div id="catalogue" style="max-width:1000px;margin:50px auto;padding:20px;">
        <h2 style="text-align:center;margin-bottom:30px;">📱 Catalogue</h2>
        <div id="appGrid" style="text-align:center;color:#6b7280;padding:50px;border:2px dashed #1f2937;border-radius:16px;">
            <i class="fab fa-android" style="font-size:50px;color:#00e676;margin-bottom:20px;display:block;"></i>
            Aucune application pour le moment.
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        // ==========================================
        // FONCTIONS SIMPLES POUR LA MODALE
        // ==========================================
        
        function ouvrirModal() {
            console.log('✅ ouvrirModal() appelée !');
            document.getElementById('maModal').classList.add('show');
        }
        
        function fermerModal() {
            console.log('✅ fermerModal() appelée !');
            document.getElementById('maModal').classList.remove('show');
            // Vider le formulaire
            document.getElementById('appName').value = '';
            document.getElementById('developer').value = '';
            document.getElementById('version').value = '';
            document.getElementById('description').value = '';
            document.getElementById('apkFile').value = '';
            document.getElementById('fileInfo').style.display = 'none';
        }
        
        function fichierSelectionne() {
            const file = document.getElementById('apkFile').files[0];
            if (file) {
                const size = (file.size / 1024 / 1024).toFixed(1);
                document.getElementById('fileInfo').textContent = '✅ ' + file.name + ' (' + size + ' MB)';
                document.getElementById('fileInfo').style.display = 'block';
            }
        }
        
        function afficherToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = '✅ ' + message;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(function() {
                toast.remove();
            }, 3000);
        }
        
        function publier() {
            const nom = document.getElementById('appName').value.trim();
            const dev = document.getElementById('developer').value.trim();
            const ver = document.getElementById('version').value.trim();
            const desc = document.getElementById('description').value.trim();
            const file = document.getElementById('apkFile').files[0];
            
            if (!nom || !dev || !ver || !desc || !file) {
                alert('Veuillez remplir tous les champs et sélectionner un fichier APK.');
                return;
            }
            
            console.log('📤 Publication de :', nom);
            afficherToast('Application "' + nom + '" publiée avec succès !');
            fermerModal();
            
            // Ajouter au catalogue
            document.getElementById('appGrid').innerHTML = `
                <div style="background:#111827;border:1px solid #1f2937;border-radius:16px;padding:20px;text-align:left;margin-bottom:10px;">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                        <i class="fab fa-android" style="font-size:30px;color:#00e676;"></i>
                        <div>
                            <strong>${nom}</strong>
                            <div style="color:#6b7280;font-size:14px;">par ${dev}</div>
                        </div>
                    </div>
                    <p style="color:#9ca3af;font-size:14px;">${desc}</p>
                    <div style="color:#00e676;font-size:13px;margin-top:10px;">v${ver}</div>
                </div>
            ` + document.getElementById('appGrid').innerHTML;
        }
        
        // Fermer la modale en cliquant à l'extérieur
        document.getElementById('maModal').addEventListener('click', function(e) {
            if (e.target === this) {
                fermerModal();
            }
        });
        
        // Fermer avec Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                fermerModal();
            }
        });
        
        console.log('✅ Script chargé - Cliquez sur "Publier un APK" pour tester !');
    </script>
</body>
</html>
